name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

# Cancel older runs on the same branch as soon as a new commit lands.
# Saves CI minutes — only the most recent commit is actually built & released.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ──────────────────────────────────────────────────────────────────
      # Gradle setup — caches dependency JARs, transforms, build-cache.
      # Project sources (app/src/**) are NEVER cached; they're always
      # taken fresh from the checkout. Build-cache is indexed by input
      # hash, so any changed file forces a recompile.
      # ──────────────────────────────────────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          add-job-summary: 'on-failure'
          gradle-home-cache-includes: |
            caches/modules-2
            caches/jars-9
            caches/transforms-4
            caches/build-cache-1
            wrapper/dists
            notifications
          gradle-home-cache-excludes: |
            caches/[0-9]*.[0-9]*
            caches/journal-1

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ──────────────────────────────────────────────────────────────────
      # Build Debug APK
      #
      #  - Daemon, build-cache, configuration-cache all kept ON (configured
      #    via gradle.properties). Subsequent builds re-use them.
      #  - Gemini API key is NOT injected here; the user enters it inside
      #    the app (stored encrypted on-device via EncryptedKeyStorage).
      #  - Debug signing key is auto-generated by AGP on first build.
      # ──────────────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --build-cache \
            --configuration-cache \
            --parallel \
            --max-workers=4

      - name: Calculate APK Size
        id: pack
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found at $APK_PATH"
            ls -la app/build/outputs/apk/debug/ || true
            exit 1
          fi
          APK_SIZE=$(stat -c%s "$APK_PATH")
          APK_MB=$(awk "BEGIN {printf \"%.1f\", $APK_SIZE / 1048576}")
          echo "▶ APK Size: ${APK_MB} MB"
          echo "apk_mb=$APK_MB" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "v1.0.${{ github.run_number }}"
          body: |
            **Commit:** `${{ github.event.head_commit.message }}`
            **SHA:** `${{ github.sha }}`

            📄 **Document Scanner — Debug Build**
            **Размер APK:** ${{ steps.pack.outputs.apk_mb }} MB

            **Установка:**
            1. Скачайте `app-debug.apk` ниже.
            2. Установите на телефон.
            3. При первом запуске откройте *Настройки → API Key* и введите свой Gemini API ключ (https://aistudio.google.com/apikey).
          files: |
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}